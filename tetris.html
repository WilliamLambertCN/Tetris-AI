<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            border: 4px solid #4a90d9;
            border-radius: 4px;
            background-color: #0d0d1a;
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: white;
            min-width: 150px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .info-box h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .info-box p {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .controls {
            font-size: 12px;
            line-height: 1.8;
            color: #ccc;
        }

        .next-piece-canvas {
            border: 2px solid #3a7bc8;
            border-radius: 4px;
            background-color: #0d0d1a;
            margin-top: 10px;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #4a90d9 0%, #3a7bc8 100%);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.4);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            display: none;
            z-index: 100;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            color: #e74c3c;
            font-size: 36px;
            margin-bottom: 15px;
        }

        .game-over p {
            color: white;
            font-size: 20px;
            margin-bottom: 25px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="board" width="300" height="600" class="game-board"></canvas>

        <div class="info-panel">
            <div class="info-box">
                <h3>分数</h3>
                <p id="score">0</p>
            </div>

            <div class="info-box">
                <h3>等级</h3>
                <p id="level">1</p>
            </div>

            <div class="info-box">
                <h3>下一个</h3>
                <canvas id="next" width="80" height="80" class="next-piece-canvas"></canvas>
            </div>

            <div class="info-box controls">
                <strong>操作说明：</strong><br>
                ← → 左右移动<br>
                ↑ 旋转<br>
                ↓ 加速下落<br>
                Space 暂停/继续
            </div>

            <button id="start-btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <div id="gameOver" class="game-over">
        <h2>游戏结束</h2>
        <p>最终得分：<span id="final-score">0</span></p>
        <button onclick="startGame()">重新开始</button>
    </div>

    <script>
        // 游戏常量
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;

        // 方块形状定义
        const SHAPES = {
            I: {
                shape: [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0]
                ],
                color: '#00f5ff'
            },
            J: {
                shape: [
                    [0, 1, 0],
                    [0, 1, 0],
                    [1, 1, 0]
                ],
                color: '#0099ff'
            },
            L: {
                shape: [
                    [0, 1, 0],
                    [0, 1, 0],
                    [0, 1, 1]
                ],
                color: '#ff9900'
            },
            O: {
                shape: [
                    [1, 1],
                    [1, 1]
                ],
                color: '#ffff00'
            },
            S: {
                shape: [
                    [0, 1, 1],
                    [1, 1, 0],
                    [0, 0, 0]
                ],
                color: '#00ff66'
            },
            T: {
                shape: [
                    [0, 1, 0],
                    [1, 1, 1],
                    [0, 0, 0]
                ],
                color: '#9900ff'
            },
            Z: {
                shape: [
                    [1, 1, 0],
                    [0, 1, 1],
                    [0, 0, 0]
                ],
                color: '#ff3333'
            }
        };

        // 游戏状态
        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let gameOver = false;
        let paused = false;
        let animationId = null;
        let lastTime = 0;
        let dropInterval = 1000;

        // DOM 元素
        const boardCanvas = document.getElementById('board');
        const ctx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');

        // 初始化游戏面板
        function initBoard() {
            board = [];
            for (let row = 0; row < ROWS; row++) {
                board[row] = [];
                for (let col = 0; col < COLS; col++) {
                    board[row][col] = null;
                }
            }
        }

        // 创建新方块
        function createPiece(type) {
            return {
                type: type,
                shape: SHAPES[type].shape.map(row => [...row]),
                color: SHAPES[type].color,
                x: Math.floor(COLS / 2) - Math.ceil(SHAPES[type].shape[0].length / 2),
                y: 0
            };
        }

        // 绘制方块单元
        function drawBlock(ctx, x, y, color, size = BLOCK_SIZE) {
            ctx.fillStyle = color;
            ctx.fillRect(x * size, y * size, size - 1, size - 1);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x * size, y * size, size - 1, size / 4);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(x * size, y * size + size - size / 4, size - 1, size / 4);
        }

        // 绘制游戏面板
        function drawBoard() {
            ctx.fillStyle = '#0d0d1a';
            ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        drawBlock(ctx, col, row, board[row][col]);
                    } else {
                        ctx.strokeStyle = '#1a1a3e';
                        ctx.strokeRect(col * BLOCK_SIZE, row * BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                    }
                }
            }
        }

        // 绘制当前方块
        function drawPiece(piece) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        drawBlock(ctx, piece.x + col, piece.y + row, piece.color);
                    }
                }
            }
        }

        // 绘制下一个预览
        function drawNextPiece() {
            nextCtx.fillStyle = '#0d0d1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (nextPiece) {
                const shape = nextPiece.shape;
                const offsetX = (4 - shape[0].length) / 2;
                const offsetY = (4 - shape.length) / 2;

                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            drawBlock(nextCtx, offsetX + col, offsetY + row, nextPiece.color, 20);
                        }
                    }
                }
            }
        }

        // 碰撞检测
        function collide(pieceShape, pieceX, pieceY) {
            for (let row = 0; row < pieceShape.length; row++) {
                for (let col = 0; col < pieceShape[row].length; col++) {
                    if (pieceShape[row][col]) {
                        const newX = pieceX + col;
                        const newY = pieceY + row;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return true;
                        }

                        if (newY >= 0 && board[newY][newX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 旋转方块
        function rotate(piece) {
            const shape = piece.shape;
            const rows = shape.length;
            const cols = shape[0].length;
            const newShape = [];

            for (let col = 0; col < cols; col++) {
                newShape[col] = [];
                for (let row = rows - 1; row >= 0; row--) {
                    newShape[col].push(shape[row][col]);
                }
            }

            const oldShape = piece.shape;
            piece.shape = newShape.map(row => [...row]);

            if (collide(piece.shape, piece.x, piece.y)) {
                piece.shape = oldShape.map(row => [...row]);
                attemptWallKick(piece);
            }
        }

        // 墙踢尝试
        function attemptWallKick(piece) {
            const directions = [-1, 1, -2, 2];

            for (const direction of directions) {
                piece.x += direction;
                if (!collide(piece.shape, piece.x, piece.y)) {
                    return;
                }
                piece.x -= direction;
            }

            piece.shape = oldShape.map(row => [...row]);
        }

        // 方块落定
        function lockPiece() {
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        const boardY = currentPiece.y + row;
                        if (boardY >= 0) {
                            board[boardY][currentPiece.x + col] = currentPiece.color;
                        }
                    }
                }
            }

            checkLines();
            spawnPiece();
        }

        // 消除行
        function checkLines() {
            let linesCleared = 0;

            for (let row = ROWS - 1; row >= 0; row--) {
                if (board[row].every(cell => cell !== null)) {
                    board.splice(row, 1);
                    board.unshift(new Array(COLS).fill(null));
                    linesCleared++;
                    row++;
                }
            }

            if (linesCleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[linesCleared] * level;
                scoreElement.textContent = score;

                level = Math.floor(score / 1000) + 1;
                levelElement.textContent = level;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);

                boardCanvas.classList.add('shake');
                setTimeout(() => {
                    boardCanvas.classList.remove('shake');
                }, 300);
            }
        }

        // 生成新方块
        function spawnPiece() {
            if (!nextPiece) {
                nextPiece = createPiece(Object.keys(SHAPES)[Math.floor(Math.random() * Object.keys(SHAPES).length)]);
            }

            currentPiece = nextPiece;
            nextPiece = createPiece(Object.keys(SHAPES)[Math.floor(Math.random() * Object.keys(SHAPES).length)]);

            drawNextPiece();

            if (collide(currentPiece.shape, currentPiece.x, currentPiece.y)) {
                gameOver = true;
                finalScoreElement.textContent = score;
                gameOverElement.classList.add('show');
                startBtn.disabled = false;
            }
        }

        // 开始游戏
        function startGame() {
            initBoard();
            score = 0;
            level = 1;
            dropInterval = 1000;
            gameOver = false;
            paused = false;
            nextPiece = null;

            scoreElement.textContent = '0';
            levelElement.textContent = '1';
            gameOverElement.classList.remove('show');
            startBtn.disabled = true;

            spawnPiece();
            lastTime = performance.now();
            cancelAnimationFrame(animationId);
            gameLoop(lastTime);
        }

        // 暂停游戏
        function togglePause() {
            if (gameOver) return;

            paused = !paused;
            startBtn.textContent = paused ? '继续游戏' : '开始游戏';

            if (!paused) {
                lastTime = performance.now();
                gameLoop(lastTime);
            }
        }

        // 游戏主循环
        function gameLoop(currentTime) {
            if (gameOver || paused) return;

            const deltaTime = currentTime - lastTime;

            if (deltaTime >= dropInterval) {
                moveDown();
                lastTime = currentTime;
            }

            drawBoard();
            drawPiece(currentPiece);

            animationId = requestAnimationFrame(gameLoop);
        }

        // 方块下移
        function moveDown() {
            if (!collide(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
                currentPiece.y++;
            } else {
                lockPiece();
            }
        }

        // 方块左移
        function moveLeft() {
            if (!collide(currentPiece.shape, currentPiece.x - 1, currentPiece.y)) {
                currentPiece.x--;
            }
        }

        // 方块右移
        function moveRight() {
            if (!collide(currentPiece.shape, currentPiece.x + 1, currentPiece.y)) {
                currentPiece.x++;
            }
        }

        // 键盘事件监听
        document.addEventListener('keydown', (e) => {
            if (gameOver) return;

            switch (e.key) {
                case 'ArrowLeft':
                    moveLeft();
                    break;
                case 'ArrowRight':
                    moveRight();
                    break;
                case 'ArrowDown':
                    moveDown();
                    break;
                case 'ArrowUp':
                    rotate(currentPiece);
                    drawBoard();
                    drawPiece(currentPiece);
                    break;
                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });

        // 初始绘制
        initBoard();
        drawBoard();
    </script>
</body>
</html>
